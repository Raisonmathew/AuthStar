apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: idaas-platform
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: idaas-platform
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: backend
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: backend
      containers:
      - name: backend
        image: ghcr.io/REPLACE_WITH_ORG/backend@sha256:REPLACE_WITH_ACTUAL_DIGEST
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: REDIS_URL
        - name: JWT_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_PRIVATE_KEY
        - name: JWT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_PUBLIC_KEY
        - name: COMPILER_SK_B64
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: COMPILER_SK_B64
              optional: true
        - name: OAUTH_TOKEN_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: OAUTH_TOKEN_ENCRYPTION_KEY
        - name: SSO_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: SSO_ENCRYPTION_KEY
        - name: FACTOR_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: FACTOR_ENCRYPTION_KEY
        - name: SENDGRID_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: SENDGRID_API_KEY
              optional: true
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: STRIPE_SECRET_KEY
              optional: true
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: STRIPE_WEBHOOK_SECRET
              optional: true
        envFrom:
        - configMapRef:
            name: backend-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: audit-overflow
          mountPath: /data/audit_overflow
      volumes:
      - name: tmp
        emptyDir: {}
      - name: audit-overflow
        emptyDir:
          sizeLimit: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: idaas-platform
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
