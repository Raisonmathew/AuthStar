# Phase 5: Headless service for runtime gRPC — enables DNS-based discovery
# for client-side load balancing across runtime replicas.
#
# A headless service (clusterIP: None) returns individual pod IPs in DNS
# A-records, allowing the API server to connect to all runtime pods directly.
apiVersion: v1
kind: Service
metadata:
  name: runtime-service-headless
  namespace: idaas-platform
  labels:
    app: runtime
    tier: backend
spec:
  clusterIP: None  # Headless — DNS returns pod IPs directly
  selector:
    app: runtime
  ports:
  - port: 50061
    targetPort: 50061
    name: grpc
---
# Phase 3: PgBouncer connection pooler deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: idaas-platform
  labels:
    app: pgbouncer
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:1.21.0
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: idaas-secrets
              key: database-url
        - name: POOL_MODE
          value: "transaction"
        - name: MAX_CLIENT_CONN
          value: "10000"
        - name: DEFAULT_POOL_SIZE
          value: "50"
        - name: MIN_POOL_SIZE
          value: "10"
        - name: RESERVE_POOL_SIZE
          value: "10"
        - name: MAX_DB_CONNECTIONS
          value: "100"
        - name: SERVER_IDLE_TIMEOUT
          value: "600"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-service
  namespace: idaas-platform
  labels:
    app: pgbouncer
    tier: backend
spec:
  selector:
    app: pgbouncer
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
