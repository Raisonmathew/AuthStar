# PodDisruptionBudgets ensure minimum availability during voluntary disruptions
# (node drains, cluster upgrades, spot instance reclamation).
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: idaas-platform
  labels:
    app: backend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: idaas-platform
  labels:
    app: frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: runtime-pdb
  namespace: idaas-platform
  labels:
    app: runtime
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: runtime
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
  namespace: idaas-platform
  labels:
    app: pgbouncer
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pgbouncer
