# HIGH-16 FIX: Kubernetes NetworkPolicy — Zero-trust network segmentation
#
# Without NetworkPolicy, all pods in the cluster can communicate freely.
# This allows a compromised pod to reach the database, Redis, or other
# internal services directly.
#
# These policies implement a default-deny posture with explicit allow rules:
# - backend can reach postgres and redis
# - runtime can only be reached by backend (gRPC)
# - frontend can only be reached by the ingress controller
# - No pod can reach the internet directly (egress restricted)

---
# Default deny all ingress and egress for the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: idaas-platform
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Allow backend to receive traffic from ingress controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-backend
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000

---
# Allow backend egress to postgres, redis, runtime, and DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Egress
  egress:
  # DNS resolution
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL (via PgBouncer)
  - to:
    - podSelector:
        matchLabels:
          app: pgbouncer
    ports:
    - protocol: TCP
      port: 5432
  # Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Runtime gRPC
  - to:
    - podSelector:
        matchLabels:
          app: runtime
    ports:
    - protocol: TCP
      port: 50061
  # External HTTPS (Stripe API, SendGrid, OAuth providers)
  # Restrict to port 443 only — no arbitrary outbound
  - ports:
    - protocol: TCP
      port: 443

---
# Allow frontend to receive traffic from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80

---
# Allow runtime to receive gRPC from backend only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-runtime
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: runtime
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 50061

---
# Allow PgBouncer egress to RDS (external) and DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pgbouncer-egress
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: pgbouncer
  policyTypes:
  - Egress
  egress:
  # DNS resolution
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL — RDS is outside the cluster, allow outbound 5432
  - ports:
    - protocol: TCP
      port: 5432

---
# Allow PgBouncer to receive connections from backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-pgbouncer
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: pgbouncer
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 5432

---
# Allow frontend to receive traffic from ingress controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80

---
# Frontend has no egress (it's a static file server)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress-dns
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Egress
  egress:
  # DNS only
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# Allow runtime to receive gRPC traffic from backend only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-runtime
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: runtime
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 50061

---
# Runtime has no egress (WASM execution is fully sandboxed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-runtime-egress-dns
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: runtime
  policyTypes:
  - Egress
  egress:
  # DNS only
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# Allow postgres to receive connections from backend only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-postgres
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 5432

---
# Allow redis to receive connections from backend only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-redis
  namespace: idaas-platform
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 6379

