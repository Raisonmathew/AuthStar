# HIGH-15 FIX: Production-grade nginx configuration with TLS, HSTS, and
# comprehensive security headers.
#
# TLS certificates are expected at:
#   /etc/nginx/ssl/tls.crt  — fullchain certificate
#   /etc/nginx/ssl/tls.key  — private key
#
# In Kubernetes, mount these from a TLS Secret:
#   kubectl create secret tls idaas-tls --cert=tls.crt --key=tls.key
# Then add a volumeMount in the frontend deployment for /etc/nginx/ssl.
#
# For local development, use the HTTP-only server block below.

# ============================================================
# Global settings
# ============================================================
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;  # Don't expose nginx version

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/wasm
        image/svg+xml;

    # ============================================================
    # HIGH-15 FIX: HTTP → HTTPS redirect (port 80)
    # ============================================================
    server {
        listen 80;
        server_name _;

        # Allow health checks over HTTP (for k8s liveness probes before TLS is ready)
        location /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HIGH-15 FIX: HTTPS server (port 443)
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ----------------------------------------------------------
        # TLS configuration
        # ----------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;

        # Only TLS 1.2 and 1.3 — disable older insecure versions
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suites (TLS 1.2 fallback + TLS 1.3 defaults)
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;  # Let TLS 1.3 choose

        # Session resumption (performance)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;  # Disable for forward secrecy

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ----------------------------------------------------------
        # HIGH-15 FIX: Security headers
        # ----------------------------------------------------------

        # HSTS: force HTTPS for 1 year, include subdomains, preload
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Referrer policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions policy — disable unused browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

        # Content Security Policy
        # - default-src 'self': only load resources from same origin
        # - script-src 'self': no inline scripts, no eval
        # - style-src 'self' 'unsafe-inline': allow inline styles (Tailwind)
        # - img-src 'self' data: https:: allow data URIs and HTTPS images
        # - connect-src 'self': API calls to same origin only
        # - frame-ancestors 'none': prevent embedding in iframes
        # - upgrade-insecure-requests: upgrade HTTP sub-resources to HTTPS
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

        # Remove X-XSS-Protection (deprecated, CSP is the replacement)
        # add_header X-XSS-Protection "1; mode=block" always;

        # ----------------------------------------------------------
        # Static assets with long-term caching
        # ----------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Re-add security headers (nginx add_header inheritance quirk)
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ----------------------------------------------------------
        # SPA fallback
        # ----------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ----------------------------------------------------------
        # API proxy to backend
        # ----------------------------------------------------------
        location /api/ {
            proxy_pass http://backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Don't expose backend errors to clients
            proxy_intercept_errors on;
        }

        # ----------------------------------------------------------
        # Health check (no TLS required for k8s probes)
        # ----------------------------------------------------------
        location /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ----------------------------------------------------------
        # Block common attack paths
        # ----------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|bak|backup|swp)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}

