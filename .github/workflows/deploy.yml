# Build & Deploy Pipeline
#
# Runs on push to main only (after CI passes via branch protection).
# Builds all 3 Docker images, pushes to GHCR with immutable digests,
# runs DB migration, and deploys to Kubernetes via kustomize overlay.
#
# Secrets required:
#   KUBECONFIG — Base64-encoded kubeconfig for the target cluster

name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  RUNTIME_IMAGE: ghcr.io/${{ github.repository }}/runtime

jobs:
  # ─── 1. Test Backend ────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: idaas_user
          POSTGRES_PASSWORD: idaas_ci_password
          POSTGRES_DB: idaas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://idaas_user:idaas_ci_password@localhost:5432/idaas_test
      REDIS_URL: redis://localhost:6379
      OTEL_SDK_DISABLED: "true"
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run tests
        working-directory: backend
        run: cargo test --all-features

      - name: Run clippy
        working-directory: backend
        run: cargo clippy -- -D warnings

  # ─── 2. Test Frontend ──────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── 3. Build Backend Image ────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }},${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 4. Build Frontend Image ───────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    needs: test-frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }},${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 5. Build Runtime Image ────────────────────────────────────────────────
  build-runtime:
    name: Build Runtime
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.runtime
          push: true
          tags: ${{ env.RUNTIME_IMAGE }}:${{ github.sha }},${{ env.RUNTIME_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 6. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [build-backend, build-frontend, build-runtime]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=kubeconfig" >> $GITHUB_ENV

      - name: Inject image digests into manifests
        env:
          BACKEND_DIGEST: ${{ needs.build-backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ needs.build-frontend.outputs.digest }}
          RUNTIME_DIGEST: ${{ needs.build-runtime.outputs.digest }}
          ORG: ${{ github.repository_owner }}
        run: |
          # Validate digests are present and well-formed (sha256:<64 hex chars>)
          for digest in "$BACKEND_DIGEST" "$FRONTEND_DIGEST" "$RUNTIME_DIGEST"; do
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "ERROR: Invalid or missing digest: '$digest'"
              exit 1
            fi
          done

          # Backend deployment + migration job share the backend digest
          for file in backend-deployment.yaml db-migration-job.yaml; do
            if [ -f "infrastructure/kubernetes/base/$file" ]; then
              sed -i \
                -e "s|REPLACE_WITH_ORG|${ORG}|g" \
                -e "s|REPLACE_WITH_ACTUAL_DIGEST|${BACKEND_DIGEST#sha256:}|g" \
                "infrastructure/kubernetes/base/$file"
            fi
          done

          # Frontend deployment
          sed -i \
            -e "s|REPLACE_WITH_ORG|${ORG}|g" \
            -e "s|REPLACE_WITH_ACTUAL_DIGEST|${FRONTEND_DIGEST#sha256:}|g" \
            infrastructure/kubernetes/base/frontend-deployment.yaml

          # Runtime deployment
          sed -i \
            -e "s|REPLACE_WITH_ORG|${ORG}|g" \
            -e "s|REPLACE_WITH_ACTUAL_DIGEST|${RUNTIME_DIGEST#sha256:}|g" \
            infrastructure/kubernetes/base/runtime-deployment.yaml

          # Verify no placeholder remains
          if grep -rE "REPLACE_WITH_(ACTUAL_DIGEST|ORG)" infrastructure/kubernetes/base/; then
            echo "ERROR: Unreplaced placeholder found in manifests"
            exit 1
          fi

          echo "All image digests injected successfully"
          echo "  backend:  ghcr.io/${ORG}/backend@${BACKEND_DIGEST}"
          echo "  frontend: ghcr.io/${ORG}/frontend@${FRONTEND_DIGEST}"
          echo "  runtime:  ghcr.io/${ORG}/runtime@${RUNTIME_DIGEST}"

      - name: Create namespace
        run: kubectl create namespace idaas-platform --dry-run=client -o yaml | kubectl apply -f -

      - name: Run database migration job
        run: |
          kubectl apply -f infrastructure/kubernetes/base/db-migration-job.yaml
          kubectl wait --for=condition=complete job/db-migrate -n idaas-platform --timeout=120s || \
            echo "WARN: Migration job may still be running or already completed"

      - name: Deploy via kustomize (production overlay)
        run: kubectl apply -k infrastructure/kubernetes/overlays/production/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n idaas-platform --timeout=5m
          kubectl rollout status deployment/frontend -n idaas-platform --timeout=5m
          kubectl rollout status deployment/runtime  -n idaas-platform --timeout=5m

      - name: Verify deployed image digests
        run: |
          echo "=== Deployed image digests ==="
          kubectl get deployment backend  -n idaas-platform -o jsonpath='{.spec.template.spec.containers[0].image}' && echo
          kubectl get deployment frontend -n idaas-platform -o jsonpath='{.spec.template.spec.containers[0].image}' && echo
          kubectl get deployment runtime  -n idaas-platform -o jsonpath='{.spec.template.spec.containers[0].image}' && echo
